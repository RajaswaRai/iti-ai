paths:
  /api/chat:
    post:
      summary: Kirim pesan ke ITI AI Assistant
      description: Endpoint untuk berinteraksi dengan chatbot AI, mendukung fitur percakapan berlanjut (history) dan dilengkapi dengan validasi input.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  maxLength: 1000
                  description: Pesan dari pengguna (tidak boleh kosong atau spasi saja).
                  example: "Siapa rektor ITI saat ini?"
                history:
                  type: array
                  description: Array riwayat percakapan sebelumnya (kosongkan [] jika chat baru).
                  example: 
                    - role: "user"
                      parts: 
                        - text: "Halo ITI!"
                    - role: "model"
                      parts: 
                        - text: "Halo! Ada yang bisa saya bantu mengenai Institut Teknologi Indonesia?"
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [user, model]
                      parts:
                        type: array
                        items:
                          type: object
                          properties:
                            text:
                              type: string
      responses:
        '200':
          description: Berhasil mendapatkan balasan dari AI beserta riwayat chat terbaru.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      reply:
                        type: string
                        example: "Rektor Institut Teknologi Indonesia saat ini adalah Dr. Ir. Marzan Aziz Iskandar, IPU., ASEAN Eng."
                      updatedHistory:
                        type: array
                        description: Riwayat obrolan lengkap yang sudah ditambahkan dengan chat terbaru.
                        example:
                          - role: "user"
                            parts: 
                              - text: "Halo ITI!"
                          - role: "model"
                            parts: 
                              - text: "Halo! Ada yang bisa saya bantu mengenai Institut Teknologi Indonesia?"
                          - role: "user"
                            parts: 
                              - text: "Siapa rektor ITI saat ini?"
                          - role: "model"
                            parts: 
                              - text: "Rektor Institut Teknologi Indonesia saat ini adalah Dr. Ir. Marzan Aziz Iskandar, IPU., ASEAN Eng."
                        items:
                          type: object
                          properties:
                            role:
                              type: string
                            parts:
                              type: array
                              items:
                                type: object
                                properties:
                                  text:
                                    type: string
        '400':
          description: Input tidak valid (gagal di Middleware)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Pesan (message) wajib diisi dan harus berupa teks."
        '500':
          description: Terjadi kesalahan internal pada server (gagal di Controller)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Maaf, terjadi kesalahan internal pada server AI."